name: Build CSGO SteamFix

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v4

      - name: Install Compilers
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y g++-multilib git

      - name: Download SDKs
        run: |
          git clone --depth 1 https://github.com/alliedmodders/sourcemod --branch master sourcemod
          git clone --depth 1 https://github.com/alliedmodders/metamod-source --branch master metamod
          git clone --depth 1 https://github.com/alliedmodders/hl2sdk --branch csgo hl2sdk-csgo

      - name: Manual Compile (Fastest Way)
        run: |
          # Ми компілюємо напряму g++, бо Makefile цього проекту може вимагати складних налаштувань
          g++ -O3 -m32 -shared -fPIC \
            -o csgo_steamfix.ext.so \
            main.cpp \
            -D_LINUX -DPOSIX -D_alloca=alloca \
            -I. \
            -I./sdk \
            -I./sourcemod/public \
            -I./sourcemod/public/extensions \
            -I./metamod/core \
            -I./metamod/core/sourcehook \
            -I./hl2sdk-csgo/public \
            -I./hl2sdk-csgo/public/tier0 \
            -I./hl2sdk-csgo/public/tier1

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: csgo-steamfix-linux
          path: csgo_steamfix.ext.so
